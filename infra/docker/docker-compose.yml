version: '3.9'

networks:
  qrpay-net:
    driver: bridge

volumes:
  mssql_data:
  redis_data:
  kafka_data:
  es_data:
  kong_data:

services:

  # ─── MSSQL Server 2022 ───────────────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qrpay-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-QrPay!Dev2026}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks: [qrpay-net]
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa
        -P "${MSSQL_SA_PASSWORD:-QrPay!Dev2026}" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qrpay-redis
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-qrpay-redis-2026}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [qrpay-net]
    healthcheck:
      test: redis-cli -a "${REDIS_PASSWORD:-qrpay-redis-2026}" ping
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Zookeeper ───────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: qrpay-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [qrpay-net]

  # ─── Apache Kafka ─────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: qrpay-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [qrpay-net]
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:29092 --list
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Kafka UI ────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: qrpay-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on: [kafka]
    networks: [qrpay-net]

  # ─── Elasticsearch 8 ─────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: qrpay-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks: [qrpay-net]
    healthcheck:
      test: curl -sf http://localhost:9200/_cluster/health
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ─── Kong (Postgres) ─────────────────────────────────────────────────────
  kong-database:
    image: postgres:15-alpine
    container_name: qrpay-kong-db
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: "${KONG_PG_PASSWORD:-kong-secret-2026}"
    networks: [qrpay-net]
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U kong
      interval: 5s
      retries: 5

  kong-migration:
    image: kong:3.6
    container_name: qrpay-kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: "${KONG_PG_PASSWORD:-kong-secret-2026}"
    depends_on:
      kong-database:
        condition: service_healthy
    networks: [qrpay-net]
    restart: on-failure

  kong:
    image: kong:3.6
    container_name: qrpay-kong
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: "${KONG_PG_PASSWORD:-kong-secret-2026}"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8443:8443"
    networks: [qrpay-net]
    healthcheck:
      test: kong health
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
